name: CI

# Event-driven (no cron). Replaces the old cron-scheduled Build.yml.
# release.yml and nightly.yml reuse this.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: {}

# Force JavaScript-based actions to run on Node 24 instead of the deprecated Node 20 ahead of
# the 2026-06-16 hard cutover, until we bump each action to a Node-24-native major version.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # The app multi-targets net48;net8.0, so the build runs on windows-latest which
  # ships both the .NET Framework 4.8 targeting pack and the .NET 8 SDK.
  build:
    name: build (windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0                       # version.pl counts commits per project
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Stamp per-package versions
        shell: bash
        run: perl .github/workflows/scripts/version.pl --stamp
      - run: dotnet build CompareByteArrays/CompareByteArrays.sln --configuration Release
