name: Build artifacts

# Shared build block, called by release.yml (manual) and nightly.yml (auto).
# Per-package versioning: version.pl --stamp writes each csproj's OWN <Version> +
# its folder's commit count. Publishes the net8.0 flavor as a self-contained
# single-file Windows binary. No NuGet package in this repo.
on:
  workflow_call:
    inputs:
      ref:
        type: string
        required: false
        default: ""

permissions:
  contents: read

# Force JavaScript-based actions to run on Node 24 instead of the deprecated Node 20 ahead of
# the 2026-06-16 hard cutover, until we bump each action to a Node-24-native major version.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: windows-latest               # the app multi-targets net48;net8.0
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Stamp per-package versions
        shell: bash
        run: perl .github/workflows/scripts/version.pl --stamp

      - name: Publish app (net8.0, win-x64, self-contained single file)
        run: dotnet publish CompareByteArrays/CompareByteArrays.csproj -c Release -f net8.0 -r win-x64 --self-contained -p:PublishSingleFile=true -o dist/CompareByteArrays-win-x64 --nologo
      - name: Zip app
        shell: pwsh
        run: Compress-Archive -Path dist/CompareByteArrays-win-x64/* -DestinationPath dist/CompareByteArrays-win-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: app-artifacts
          path: dist/*.zip
          if-no-files-found: ignore
